<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mega Game Hub</title>
    <style>
        body { 
            font-family: Arial, sans-serif; 
            text-align: center; 
            margin-top: 50px; 
            background-color: #121212;
            color: white; 
        }
        .container { 
            max-width: 400px; 
            margin: auto; 
            padding: 30px 20px; 
            background: #1e1e1e; 
            border-radius: 10px; 
            box-shadow: 0 0 15px rgba(0,0,0,0.5); 
        }
        input { 
            width: 85%; 
            padding: 12px; 
            margin: 10px 0; 
            border-radius: 5px; 
            border: none; 
            outline: none;
        }
        button { 
            padding: 10px 20px; 
            margin: 10px 5px; 
            border: none; 
            border-radius: 5px; 
            cursor: pointer; 
            font-weight: bold; 
            font-size: 16px;
        }
        .btn-green { background-color: #4CAF50; color: white; }
        .btn-blue { background-color: #2196F3; color: white; }
    </style>
</head>
<body>

    <div id="loginScreen" class="container">
        <h1 style="color: #ff9800;">🔥 Mega Game Hub</h1>
        <p>Login ya Register Karein</p>
        
        <input type="email" id="email" placeholder="Email Address">
        <input type="password" id="password" placeholder="Password (Min 6 chars)">
        <br>
        <button class="btn-green" type="button" onclick="loginUser()">Login</button>
        <button class="btn-blue" type="button" onclick="registerUser()">Register</button>
        
        <p id="statusMessage" style="font-weight: bold; margin-top: 15px; font-size: 14px; min-height: 20px;"></p>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
        import { getAuth, createUserWithEmailAndPassword, signInWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-auth.js";
        import { getFirestore, doc, setDoc } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore.js";

        // Import the functions you need from the SDKs you need
import { initializeApp } from "firebase/app";
import { getAnalytics } from "firebase/analytics";
// TODO: Add SDKs for Firebase products that you want to use
// https://firebase.google.com/docs/web/setup#available-libraries

// Your web app's Firebase configuration
// For Firebase JS SDK v7.20.0 and later, measurementId is optional
const firebaseConfig = {
  apiKey: "AIzaSyBH_oyJjcXiElydtfMHsEIOGAgzHryy1m8",
  authDomain: "megagamehub-f8ff3.firebaseapp.com",
  projectId: "megagamehub-f8ff3",
  storageBucket: "megagamehub-f8ff3.firebasestorage.app",
  messagingSenderId: "918110428941",
  appId: "1:918110428941:web:3c0de8c0c5a52fca41da44",
  measurementId: "G-33QNKJNC29"
};

// Initialize Firebase
const app = initializeApp(firebaseConfig);
const analytics = getAnalytics(app);

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        window.registerUser = () => { 
            let e = document.getElementById('email').value;
            let p = document.getElementById('password').value; 
            let msg = document.getElementById('statusMessage');
            
            if(!e || !p) { 
                msg.style.color = "#f44336"; 
                msg.innerText = "❌ Email aur Password dono daalein!"; 
                return; 
            }
            
            msg.style.color = "#ffcc00"; 
            msg.innerText = "⏳ Register kar rahe hain...";
            
            createUserWithEmailAndPassword(auth, e, p)
            .then(u => {
                setDoc(doc(db, "users", u.user.uid), {
                    email: e, 
                    balance: 0, 
                    history: []
                });
                msg.style.color = "#4CAF50"; 
                msg.innerText = "✅ Account ban gaya!";
            })
            .catch(error => {
                msg.style.color = "#f44336"; 
                if(error.code === 'auth/weak-password') { msg.innerText = "❌ Password kam se kam 6 letters ka hona chahiye!"; }
                else if(error.code === 'auth/email-already-in-use') { msg.innerText = "❌ Ye Email pehle se register hai! Kripya Login karein."; }
                else { msg.innerText = "❌ Error: " + error.message; }
            });
        };

        window.loginUser = () => {
            let e = document.getElementById('email').value;
            let p = document.getElementById('password').value; 
            let msg = document.getElementById('statusMessage');
            
            if(!e || !p) { 
                msg.style.color = "#f44336"; 
                msg.innerText = "❌ Email aur Password dono daalein!"; 
                return; 
            }
            
            msg.style.color = "#ffcc00"; 
            msg.innerText = "⏳ Login kar rahe hain...";

            signInWithEmailAndPassword(auth, e, p)
            .then(() => {
                msg.style.color = "#4CAF50"; 
                msg.innerText = "✅ Login Successful!";
            })
            .catch(error => {
                msg.style.color = "#f44336"; 
                msg.innerText = "❌ Galat Email ya Password!";
            });
        };
    </script>
</body>
</html>
