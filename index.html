<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mega Game Hub</title>
    <style>
        body { background-color: #121212; color: white; font-family: Arial, sans-serif; text-align: center; margin: 0; padding: 20px; }
        .container { max-width: 400px; margin: auto; background: #1e1e1e; padding: 20px; border-radius: 10px; box-shadow: 0 4px 8px rgba(0,0,0,0.5); }
        input { width: 90%; padding: 10px; margin: 10px 0; border-radius: 5px; border: none; }
        button { background: #4CAF50; color: white; border: none; padding: 10px 15px; margin: 5px; cursor: pointer; border-radius: 5px; font-size: 16px; width: 45%; }
        button:hover { background: #45a049; }
        .wallet-box { background: #333; padding: 15px; border-radius: 8px; margin: 15px 0; }
        .hidden { display: none; }
        .game-btn { background: #ff9800; width: 90%; margin-top: 10px; }
        .logout-btn { background: #f44336; width: 90%; margin-top: 15px; }
    </style>
</head>
<body>

    <div id="loginScreen" class="container">
        <h2>🎮 Mega Game Hub</h2>
        <p>Login ya Register Karein</p>
        <input type="email" id="email" placeholder="Email daalein">
        <input type="password" id="password" placeholder="Password daalein">
        <button onclick="loginUser()">Login</button>
        <button onclick="registerUser()">Register</button>
        <p id="statusMessage"></p>
    </div>

    <div id="gameMenu" class="container hidden">
        <h2>Welcome!</h2>
        
        <div class="wallet-box">
            <h3>💰 Wallet Balance</h3>
            <h2 id="walletBalance">₹ 0</h2>
            <button onclick="depositMoney()">➕ Deposit ₹100</button>
            <button onclick="withdrawMoney()">➖ Withdraw ₹50</button>
        </div>

        <h3>Tournaments & Games:</h3>
        <button class="game-btn">🎲 Play Ludo (Entry: ₹10)</button>
        <button class="game-btn">🃏 Play Poker (Entry: ₹50)</button>
        
        <button class="logout-btn" onclick="logoutUser()">🚪 Log Out</button>
    </div>

    <script>
        // UI Screens dikhane/chupane ka code
        window.showGameMenu = function() {
            document.getElementById('loginScreen').classList.add('hidden');
            document.getElementById('gameMenu').classList.remove('hidden');
        };
        window.showLoginScreen = function() {
            document.getElementById('gameMenu').classList.add('hidden');
            document.getElementById('loginScreen').classList.remove('hidden');
            document.getElementById('email').value = "";
            document.getElementById('password').value = "";
            document.getElementById('statusMessage').innerText = "";
            document.getElementById('walletBalance').innerText = "₹ 0";
        };
    </script>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
        import { getAuth, createUserWithEmailAndPassword, signInWithEmailAndPassword, signOut, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";
        import { getFirestore, doc, setDoc, getDoc, updateDoc } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";
        
        const firebaseConfig = {
            apiKey: "AIzaSyBH_oyJjcXiElydtfMHsEIOGAgzHryy1m8",
            authDomain: "megagamehub-f8ff3.firebaseapp.com",
            projectId: "megagamehub-f8ff3",
            storageBucket: "megagamehub-f8ff3.firebasestorage.app",
            messagingSenderId: "918110428941",
            appId: "1:918110428941:web:3c0de8c0c5a52fca41da44"
        };
        
        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app); 
        const db = getFirestore(app);

        let currentUser = null;
        let currentBalance = 0;

        // --- REGISTER SYSTEM ---
        window.registerUser = function() {
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const status = document.getElementById('statusMessage');

            if (email === "" || password === "") {
                status.innerText = "❌ Email/Password khali mat chhodna!";
                return;
            }

            status.innerText = "Account ban raha hai... ⏳";
            createUserWithEmailAndPassword(auth, email, password)
                .then(async (userCredential) => { 
                    await setDoc(doc(db, "users", userCredential.user.uid), {
                        email: email,
                        balance: 0  // Database mein naya account aur 0 balance save hoga
                    });
                    status.innerText = "";
                })
                .catch((error) => { status.innerText = "Galti: " + error.message; });
        };

        // --- LOGIN SYSTEM ---
        window.loginUser = function() {
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const status = document.getElementById('statusMessage');
            
            if (email === "" || password === "") return;
            status.innerText = "Login ho raha hai... ⏳";

            signInWithEmailAndPassword(auth, email, password)
                .catch((error) => { status.innerText = "❌ Galat password ya email!"; });
        };

        // --- LOGOUT SYSTEM ---
        window.logoutUser = function() {
            signOut(auth);
        };

        // --- PAISA DEPOSIT / WITHDRAW KAREIN (Database Connection) ---
        window.depositMoney = async function() {
            if(currentUser) {
                currentBalance += 100;
                document.getElementById('walletBalance').innerText = "₹ " + currentBalance;
                await updateDoc(doc(db, "users", currentUser.uid), { balance: currentBalance }); // Database mein update
            }
        };

        window.withdrawMoney = async function() {
            if(currentUser && currentBalance >= 50) {
                currentBalance -= 50;
                document.getElementById('walletBalance').innerText = "₹ " + currentBalance;
                await updateDoc(doc(db, "users", currentUser.uid), { balance: currentBalance }); // Database mein update
            } else {
                alert("Balance kam hai!");
            }
        };

        // --- HAR BAAR PAGE KHULNE PAR DATABASE SE BALANCE LANA ---
        onAuthStateChanged(auth, async (user) => {
            if (user) {
                currentUser = user;
                window.showGameMenu(); // Login hai toh menu dikhao
                
                // Database se real balance nikalo
                const docSnap = await getDoc(doc(db, "users", user.uid));
                if (docSnap.exists()) {
                    currentBalance = docSnap.data().balance;
                    document.getElementById('walletBalance').innerText = "₹ " + currentBalance;
                }
            } else {
                currentUser = null;
                window.showLoginScreen(); // Login nahi hai toh login screen dikhao
            }
        });
    </script>
</body>
</html>
