<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MegaGameHub</title>
    <style>
        /* Yahan aapka CSS hoga */
        .hidden { display: none; }
        .text-green { color: #4CAF50; }
        .text-red { color: #f44336; }
        .history-item { padding: 8px; border-bottom: 1px solid #333; }
        .rolling { animation: roll 0.5s linear; }
        @keyframes roll { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>
    <!-- ===== LOGIN SCREEN ===== -->
    <div id="loginScreen">
        <h2>Login / Sign Up</h2>
        <input type="email" id="email" placeholder="Email daalo"><br><br>
        <input type="password" id="password" placeholder="Password daalo"><br><br>
        <button onclick="loginUser()">Login</button>
        <button onclick="registerUser()">Sign Up</button>
        <p id="statusMessage"></p>
    </div>

    <!-- ===== MAIN APP SCREEN ===== -->
    <div id="appScreen" class="hidden">
        <h2>Welcome <span id="userEmail"></span></h2>
        <h3>Wallet Balance: <span id="walletBalance">₹0</span></h3>
        <button onclick="openDepositModal()">Deposit</button>
        <button onclick="openWithdrawModal()">Withdraw</button>
        <button onclick="logoutUser()">Logout</button>

        <h3>Games</h3>
        <button onclick="playGame('Ludo', 10)">Play Ludo - ₹10</button>
        <button onclick="playGame('Poker', 20)">Play Poker - ₹20</button>

        <h3>History</h3>
        <div id="historyList"></div>
        
        <!-- Game Arenas -->
        <div id="ludoArena" class="hidden">
            <h3>Ludo</h3>
            <div id="dice" style="font-size:50px; cursor:pointer;">🎲</div>
            <p id="ludoResult"></p>
            <button onclick="showScreen('appScreen')">Back</button>
        </div>

        <div id="pokerArena" class="hidden">
            <h3>Poker</h3>
            <div id="card" style="font-size:50px; cursor:pointer;">🂠</div>
            <p id="pokerResult"></p>
            <button onclick="showScreen('appScreen')">Back</button>
        </div>
    </div>

    <!-- ===== MODALS ===== -->
    <div id="depositModal" class="hidden">
        <h3>Deposit Money</h3>
        <input type="number" id="depositAmount" placeholder="Amount Min ₹50"><br><br>
        <input type="text" id="depositUTR" placeholder="UTR Number"><br><br>
        <button onclick="payViaUPI()">Pay via UPI</button>
        <button onclick="requestDeposit()">I have paid</button>
        <button onclick="closeModals()">Close</button>
        <p id="depositError"></p>
    </div>

    <div id="withdrawModal" class="hidden">
        <h3>Withdraw Money</h3>
        <p>Available: <span id="availBalanceModal">₹0</span></p>
        <input type="number" id="withdrawAmount" placeholder="Amount Min ₹50"><br><br>
        <input type="text" id="upiId" placeholder="UPI ID / Paytm Number"><br><br>
        <button onclick="requestWithdrawal()">Request Withdrawal</button>
        <button onclick="closeModals()">Close</button>
        <p id="withdrawError"></p>
    </div>

    <!-- ===== FIREBASE + GAME CODE START ===== -->
    <script type="module">
        // 1. FIREBASE IMPORTS
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
        import { getAuth, createUserWithEmailAndPassword, signInWithEmailAndPassword, signOut, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";
        import { getFirestore, doc, setDoc, getDoc, updateDoc, arrayUnion, onSnapshot } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

        // 2. AAPKA FIREBASE CONFIG - Screenshot wala
        const firebaseConfig = {
            apiKey: "AIzaSyBH_oyJjcXiE...",  // Yahan apni asli key daalo
            authDomain: "megagamehub-f8...",
            projectId: "megagamehub-f8...",
            storageBucket: "megagamehub...",
            messagingSenderId: "918110...",
            appId: "1:918110428941:web...",
            measurementId: "G-33QNKJNC..."
        };

        // 3. FIREBASE INITIALIZE
        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        // 4. GLOBAL VARIABLES
        let currentUser = null;
        let currentBalance = 0;
        const ADMIN_UPI = "yourupi@paytm"; // Yahan apna UPI daalo
        const ADMIN_WA = "919999999999"; // Yahan apna WhatsApp number daalo
        
        // Sounds - Agar nahi hai to comment kar do
        const sounds = {
            roll: { play: () => console.log("roll sound") },
            win: { play: () => console.log("win sound") },
            lose: { play: () => console.log("lose sound") }
        };

        const statusMessage = document.getElementById('statusMessage');

        // 5. SCREEN MANAGEMENT
        window.showScreen = (screenId) => {
            document.querySelectorAll('body > div').forEach(div => div.classList.add('hidden'));
            document.getElementById(screenId).classList.remove('hidden');
        }

        window.closeModals = () => {
            document.getElementById('depositModal').classList.add('hidden');
            document.getElementById('withdrawModal').classList.add('hidden');
        }

        // 6. AUTH FUNCTIONS - LOGIN/SIGNUP/LOGOUT
        window.registerUser = () => { 
            let e = document.getElementById('email').value; 
            let p = document.getElementById('password').value; 
            statusMessage.innerText = "Registering...";
            if(!e || !p) {
                statusMessage.innerText = "Email aur Password daalo";
                return;
            }
            createUserWithEmailAndPassword(auth, e, p)
                .then(u => setDoc(doc(db, "users", u.user.uid), {
                    email: e, 
                    balance: 50, 
                    history: ["+₹50 (Signup Bonus)"]
                }))
                .catch(err => statusMessage.innerText = "Error: " + err.message);
        };

        window.loginUser = () => {
            let e = document.getElementById('email').value; 
            let p = document.getElementById('password').value; 
            statusMessage.innerText = "Logging in...";
            signInWithEmailAndPassword(auth, e, p)
                .catch(err => statusMessage.innerText = "Error: " + err.message);
        };

        window.logoutUser = () => {
            signOut(auth);
        };

        // 7. CHECK IF USER LOGGED IN
        onAuthStateChanged(auth, (user) => {
            if (user) {
                currentUser = user;
                document.getElementById('userEmail').innerText = user.email;
                showScreen('appScreen');
                listenToUserData(); // Real-time data suno
            } else {
                currentUser = null;
                showScreen('loginScreen');
            }
        });

        // 8. REAL-TIME DATA FROM FIRESTORE
        function listenToUserData() {
            const userRef = doc(db, "users", currentUser.uid);
            onSnapshot(userRef, (docSnap) => {
                if (docSnap.exists()) {
                    const data = docSnap.data();
                    currentBalance = data.balance || 0;
                    document.getElementById('walletBalance').innerText = "₹" + currentBalance;
                    updateHistory(data.history || []);
                }
            });
        }

        function refreshData() {
            // onSnapshot khud refresh kar dega, iski zarurat nahi
        }

        // 9. AAPKA PURANA GAME CODE - Theek karke
        function updateHistory(arr) {
            const list = document.getElementById('historyList'); 
            list.innerHTML = "";
            if (!arr || arr.length === 0) { 
                list.innerHTML = '<div class="history-item">No transactions yet.</div>'; 
                return; 
            }
            [...arr].reverse().forEach(item => {
                let cl = item.includes("+") ? "text-green" : "text-red";
                list.innerHTML += `<div class="history-item ${cl}">${item}</div>`;
            });
        }

        async function addMoney(amt, msg) {
            currentBalance += amt; 
            document.getElementById('walletBalance').innerText = "₹" + currentBalance;
            document.getElementById('availBalanceModal').innerText = "₹" + currentBalance;
            await updateDoc(doc(db, "users", currentUser.uid), { 
                balance: currentBalance, 
                history: arrayUnion(`+₹${amt} (${msg})`) 
            });
        }

        async function deductMoney(amt, msg) {
            currentBalance -= amt; 
            document.getElementById('walletBalance').innerText = "₹" + currentBalance;
            document.getElementById('availBalanceModal').innerText = "₹" + currentBalance;
            await updateDoc(doc(db, "users", currentUser.uid), { 
                balance: currentBalance, 
                history: arrayUnion(`-₹${amt} (${msg})`) 
            });
        }

        window.playGame = async function(game, fee) {
            if(!currentUser) return;
            if(currentBalance >= fee) {
                await deductMoney(fee, `Played ${game}`);
                if(game === 'Ludo') { 
                    showScreen('ludoArena'); 
                    document.getElementById('ludoResult').innerText = "Roll the dice!"; 
                    document.getElementById('dice').innerText = "🎲"; 
                    document.getElementById('dice').onclick = window.rollDice; 
                }
                if(game === 'Poker') { 
                    showScreen('pokerArena'); 
                    document.getElementById('pokerResult').innerText = "Draw a card!"; 
                    document.getElementById('card').innerText = "🂠"; 
                    document.getElementById('card').onclick = window.drawCard; 
                }
            } else { 
                alert("Insufficient Balance!"); 
            }
        };

        window.rollDice = function() {
            const dice = document.getElementById('dice'); 
            const res = document.getElementById('ludoResult');
            dice.classList.add('rolling'); 
            res.style.color = "white"; 
            res.innerText = "Rolling..."; 
            sounds.roll.play(); 
            dice.onclick = null;
            setTimeout(() => {
                dice.classList.remove('rolling'); 
                const num = Math.floor(Math.random() * 6) + 1;
                const faces = ['🎲', '⚀', '⚁', '⚂', '⚃', '⚄', '⚅']; 
                dice.innerText = faces[num];
                if(num === 6) { 
                    sounds.win.play(); 
                    res.style.color = "#4CAF50"; 
                    res.innerText = "🎉 BINGO! You won ₹20!"; 
                    addMoney(20, 'Ludo Win'); 
                } else { 
                    sounds.lose.play(); 
                    res.style.color = "#f44336"; 
                    res.innerText = `You rolled ${num}. Try again!`; 
                    dice.onclick = window.rollDice; 
                }
            }, 800);
        };

        window.drawCard = function() {
            const card = document.getElementById('card'); 
            const res = document.getElementById('pokerResult');
            card.classList.add('rolling'); 
            res.style.color = "white"; 
            res.innerText = "Drawing..."; 
            sounds.roll.play(); 
            card.onclick = null;
            setTimeout(() => {
                card.classList.remove('rolling'); 
                const cards = ['🂷', '🃎', '🃝', '🂢', '🂫', '🂺', '🂡', '🃅'];
                const rc = cards[Math.floor(Math.random() * cards.length)]; 
                card.innerText = rc;
                if(rc === '🂡') { 
                    sounds.win.play(); 
                    res.style.color = "#4CAF50"; 
                    res.innerText = "🎰 JACKPOT! Ace opened! You won ₹100!"; 
                    addMoney(100, 'Poker Win'); 
                } else { 
                    sounds.lose.play(); 
                    res.style.color = "#f44336"; 
                    res.innerText = "Bad luck! Try again."; 
                    card.onclick = window.drawCard; 
                }
            }, 800);
        };

        window.openDepositModal = () => {
            document.getElementById('depositModal').classList.remove('hidden');
            document.getElementById('depositError').innerText = "";
        };
        
        window.openWithdrawModal = () => {
            document.getElementById('withdrawModal').classList.remove('hidden');
            document.getElementById('availBalanceModal').innerText = "₹" + currentBalance;
            document.getElementById('withdrawError').innerText = "";
        };

        window.payViaUPI = () => { 
            let a = document.getElementById('depositAmount').value; 
            if(a>=50) window.location.href = `upi://pay?pa=${ADMIN_UPI}&pn=Admin&am=${a}&cu=INR`; 
            else document.getElementById('depositError').innerText = "❌ Min ₹50 daalein!";
        };

        window.requestDeposit = async () => { 
            let a = parseInt(document.getElementById('depositAmount').value); 
            let u = document.getElementById('depositUTR').value; 
            let err = document.getElementById('depositError');

            if(isNaN(a) || a < 50) { err.innerText = "❌ Min ₹50 deposit karein!"; return; }
            if(u.trim() === "") { err.innerText = "❌ UTR Number daalna zaroori hai!"; return; }

            err.innerText = "⏳ Processing...";
            await updateDoc(doc(db, "users", currentUser.uid), { history: arrayUnion(`Deposit Req: +₹${a} (UTR: ${u})`) }); 
            window.location.href = `https://wa.me/${ADMIN_WA}?text=Deposit%0AUid: ${currentUser.uid}%0AAmt: ₹${a}%0AUTR: ${u}`; 
            closeModals(); 
        };

        window.requestWithdrawal = async () => { 
            let a = parseInt(document.getElementById('withdrawAmount').value); 
            let u = document.getElementById('upiId').value; 
            let err = document.getElementById('withdrawError');

            if(isNaN(a) || a < 50) { err.innerText = "❌ Min ₹50 nikal sakte hain!"; return; }
            if(a > currentBalance) { err.innerText = "❌ Aapke account mein itne paise nahi hain!"; return; }
            if(u.trim() === "") { err.innerText = "❌ Apna UPI ID / Paytm number daalein!"; return; }

            err.innerText = "⏳ Processing...";
            await deductMoney(a, 'Withdraw Pending'); 
            window.location.href = `https://wa.me/${ADMIN_WA}?text=Withdraw%0AUid: ${currentUser.uid}%0AAmt: ₹${a}%0AUPI: ${u}`; 
            closeModals(); 
        };
    </script>
    <!-- ===== FIREBASE + GAME CODE END ===== -->
</body>
</html>
